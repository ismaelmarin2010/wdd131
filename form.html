<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 – Dynamic Web Fundamentals – Ismael Marin</title>
    <meta name="description" content="WDD 131 – Dynamic Web Fundamentals | Ismael Marin | Form for Product Review.">
    <meta name="author" content="Ismael Marin">
    <link rel="stylesheet" href="styles/form.css">
    <link rel="stylesheet" href="styles/form-large.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Montserrat&display=swap" rel="stylesheet">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <span id="header-title">Product Review</span>
    </header>

    <main>
        <h1>Submit a Review</h1>

        <form method="get" action="review.html">

            <label for="product">Product Name</label>
            <select id="product" name="product" required>
                <option value="" disabled selected>Select a Product ...</option>
            </select>

            <label>Overall Rating</label>
            <div class="rating">
                <input type="radio" id="r1" name="rating" value="1" required><label for="r1">1</label>
                <input type="radio" id="r2" name="rating" value="2" required><label for="r2">2</label>
                <input type="radio" id="r3" name="rating" value="3" required><label for="r3">3</label>
                <input type="radio" id="r4" name="rating" value="4" required><label for="r4">4</label>
                <input type="radio" id="r5" name="rating" value="5" required><label for="r5">5</label>
            </div>

            <label for="installDate">Date of Installation</label>
            <input type="date" id="installDate" name="installDate" required>

            <label>Useful Features</label>
            <div class="features">
                <input type="checkbox" id="feature1" name="features" value="Durability">
                <label for="feature1">Durability</label>

                <input type="checkbox" id="feature2" name="features" value="Ease of Use">
                <label for="feature2">Ease of Use</label>

                <input type="checkbox" id="feature3" name="features" value="Performance">
                <label for="feature3">Performance</label>

                <input type="checkbox" id="feature4" name="features" value="Design">
                <label for="feature4">Design</label>
            </div>

            <label for="review">Written Review</label>
            <textarea id="review" name="review"></textarea>

            <label for="username">Your Name</label>
            <input type="text" id="username" name="username">

            <input type="submit" value="Submit Review">

        </form>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> - Ismael Marin - Argentina</p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>

</body>

</html>
